<main class="filter-area">
    <header class="filter-header">
        <div>
            <h2 class="filter-heading">Фільтр та керування курсами</h2>
            <p class="filter-subtitle">combineLatest + BehaviorSubject · реактивність</p>
        </div>
        <button class="btn-add" (click)="toggleForm()">
            {{ showForm ? '✕ Закрити' : '+ Додати курс' }}
        </button>
    </header>

    <!-- Форма додавання -->
    <div class="form-container" *ngIf="showForm">
        <h3 class="form-title">Новий курс</h3>
        <div class="form-fields">
            <div class="form-group">
                <label class="form-label">Назва</label>
                <input type="text" class="form-input" [(ngModel)]="newTitle"
                    placeholder="Введіть назву курсу" />
            </div>
            <div class="form-group">
                <label class="form-label">Категорія</label>
                <input type="text" class="form-input" [(ngModel)]="newCategory"
                    placeholder="Frontend, Backend, DevOps..." />
            </div>
            <div class="form-group">
                <label class="form-label">Тривалість</label>
                <input type="text" class="form-input" [(ngModel)]="newDuration"
                    placeholder="Наприклад: 10 годин" />
            </div>
        </div>
        <button class="btn-submit" (click)="addCourse()"
            [disabled]="!newTitle.trim() || !newCategory.trim() || !newDuration.trim()">
            Додати курс
        </button>
    </div>

    <!-- Фільтри -->
    <div class="filters-row">
        <div class="filter-field">
            <label class="field-label">Пошук за назвою</label>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="text-input" [(ngModel)]="searchTerm"
                    (input)="onSearchChange($event)"
                    placeholder="Введіть назву для пошуку..." autocomplete="off" />
            </div>
        </div>
        <div class="filter-field">
            <label class="field-label">Категорія</label>
            <select class="select-input" [(ngModel)]="selectedCategory"
                (change)="onCategoryChange($event)">
                <option value="">Усі категорії</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
            </select>
        </div>
    </div>

    <!-- Список курсів -->
    <div class="results-list">
        <ng-container *ngIf="filteredCourses$ | async as coursesList">

            <div class="results-count">
                Знайдено: <strong>{{ coursesList.length }}</strong>
            </div>

            <div class="empty-state" *ngIf="coursesList.length === 0">
                <p>За вашими фільтрами нічого не знайдено.</p>
            </div>

            <div class="course-item" *ngFor="let course of coursesList">
                <div class="course-body">
                    <h4 class="course-title">{{ course.title }}</h4>
                    <p class="course-meta">
                        Категорія: <span class="course-category">{{ course.category }}</span>
                    </p>
                </div>
                <div class="course-side">
                    <div class="chip">{{ course.duration }}</div>
                    <button class="btn-delete" (click)="deleteCourse(course.id)">Видалити</button>
                </div>
            </div>

        </ng-container>
    </div>
</main>
